version: '3.8'

services:

  # ─────────────────────────────────────────
  # MESSAGE BROKER
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: wind-sentinel-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    restart: unless-stopped

  # ─────────────────────────────────────────
  # DATABASE
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: wind-sentinel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  # ─────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────

  data-ingestion-service:
    build: ./services/data-ingestion-service
    container_name: wind-sentinel-ingestion
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      SCADA_DATA_PATH: /data
    ports:
      - "8001:8001"
    volumes:
      - ./data:/data:ro
    restart: unless-stopped

  feature-service:
    build: ./services/feature-service
    container_name: wind-sentinel-feature
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - "8002:8002"
    restart: unless-stopped

  prediction-service:
    build: ./services/prediction-service
    container_name: wind-sentinel-prediction
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: wind-sentinel-rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
    ports:
      - "8003:8000"
    restart: unless-stopped
  # notification-service:
  #   build: ./services/notification-service
  #   container_name: wind-sentinel-notification
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     RABBITMQ_URL: ${RABBITMQ_URL}
  #     DATABASE_URL: ${DATABASE_URL}
  #   ports:
  #     - "${NOTIFICATION_PORT:-8003}:8003"
  #   restart: unless-stopped

  # api-gateway:
