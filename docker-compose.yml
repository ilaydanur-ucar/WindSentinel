version: '3.8'

services:

  # ─────────────────────────────────────────
  # MESSAGE BROKER
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: wind-sentinel-rabbitmq
    ports:
      - "5672:5672"       # AMQP (servisler buraya bağlanır)
      - "15672:15672"     # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ─────────────────────────────────────────
  # DATABASE
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: wind-sentinel-postgres
    environment:
      POSTGRES_DB: windsentinel
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"    # 5434 dışarı (yerel PG ile çakışmasın), 5432 container içi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d windsentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─────────────────────────────────────────
  # MICROSERVICES (Hafta 2'den itibaren aktif)
