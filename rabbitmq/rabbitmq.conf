## WindSentinel RabbitMQ Configuration
## Credentials are managed via definitions.json (password hash, not plaintext)

# Management plugin - loads users, queues, exchanges from definitions.json
management.load_definitions = /etc/rabbitmq/definitions.json

# Logging
log.console = true
log.console.level = info

# Memory watermark
vm_memory_high_watermark.relative = 0.4
